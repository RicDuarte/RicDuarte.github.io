<!DOCTYPE html>
<html lang="pt-PT">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Ricardo Duarte — Tradução e legendagem audiovisual</title>

  <!-- FONTS -->

  <link rel="preconnect"
        href="https://fonts.googleapis.com">

  <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&display=swap"
        rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/index.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav>
    <a href="index.html"
       class="logo">
      RICARDO DUARTE
    </a>

    <div class="nav-links">

    <a
        id="nav-about" href="index.html">
    </a>
    
    <a
        id="nav-portfolio" href="pages/portfolio.html">
    </a>
    
    <a
        id="nav-contact" href="pages/contactos.html">
    </a>

    </div>
    
    <div class="language-switch">
    
        <span
        class="lang-option"
        data-lang="pt"
        onclick="loadLanguage('pt')">
        PT
    </span>
    
    <span class="lang-separator">/</span>
    
    <span
        class="lang-option"
        data-lang="en"
        onclick="loadLanguage('en')">
        EN
    </span>
    
    </div>

  </nav>

  <!-- HERO -->

  <section class="hero">

    <div class="hero-background"></div>

    <div class="container hero-grid">

      <div class="hero-left">

        <div id="hero-subtitle" class="hero-subtitle"></div>

        <h1>
          <span id="hero-first-name" class="hero-name-white">
          </span>

          <br>

          <span id="hero-last-name" class="hero-name-red"></span>
        </h1>

        <div id="hero-description" class="hero-description"></div>

      </div>

      <div class="hero-image">

        <div class="image-overlay"></div>
        <img id="hero-image" src="" alt="">

      </div>

    </div>

  </section>

  <main>

    <!-- ABOUT -->

    <section class="section">

      <div class="container">

        <h2 id="about-title" class="section-title">
          Sobre Mim
        </h2>

        <div class="about-grid">

          <div class="about-text">

            <p id="about-text-1"></p>
            
            <p id="about-text-2"></p>

            <p id="about-text-3"></p>
            
          </div>

          <div class="stats">

            <div class="stat">

              <h3 id="aboutExpYears"></h3>

              <p id="aboutExpYearsDescription"></p>

            </div>

            <div class="stat">

              <h3 id="aboutExpProjects"></h3>

              <p id="aboutExpProjectsDescription"></p>

            </div>

            <div class="stat">

              <h3 id="aboutExpChannels"></h3>

              <p id="aboutExpChannelsDescription"></p>

            </div>

          </div>

        </div>

      </div>

    </section>

    <!-- EXPERIENCE -->

    <section class="section">

      <div class="container">

        <h2 id="experience-title" class="section-title"></h2>

        <div id="experience-container" class="timeline"></div>

      </div>

    </section>

    <!-- SKILLS -->

    <section class="section">

      <div class="container">

        <h2 id="skills-title" class="section-title">
          Competências
        </h2>

        <div id="skills-container" class="skills"></div>

      </div>

    </section>

  </main>

  <!-- FOOTER -->

  <footer>

    <div class="container footer-content">

      <p>
        © 2026 Ricardo Duarte
      </p>

      <div class="footer-links">

        <a href="#">IMDb</a>

        <a href="#">LinkedIn</a>

        <a href="pages/contactos.html">Email</a>

      </div>

    </div>

  </footer>
  
  <script src="data/index-content.js"></script>
  <script src="scripts/language.js"></script>
  <script src="scripts/script.js"></script>

</body>
</html>
