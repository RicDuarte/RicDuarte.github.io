<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricardo - Tradutor Audiovisual</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: #1c1c1c;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    nav {
      text-align: center;
      margin: 30px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: #1f1f1f;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .card-content {
      padding: 15px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>Ricardo</h1>
  <p>Tradutor Audiovisual PT-PT</p>
</header>

<nav>
  <a href="#">Sobre</a>
  <a href="#">CV</a>
  <a href="#">Portefólio</a>
</nav>

<section class="portfolio">

  <div class="card">
    <img src="https://via.placeholder.com/500x750" alt="Poster">
    <div class="card-content">
      <h2>Reacher</h2>
      <p>Revisão</p>
      <p>Prime Video</p>
      <p>2026</p>
    </div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/500x750" alt="Poster">
    <div class="card-content">
      <h2>The Last Kingdom</h2>
      <p>Tradução</p>
      <p>Netflix</p>
      <p>2025</p>
    </div>
  </div>

</section>

<footer>
  © 2026 Ricardo
</footer>

</body>
</html>
