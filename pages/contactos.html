<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Contactos</title>

  <link rel="stylesheet"
        href="../css/global.css">

  <link rel="stylesheet"
        href="../css/contactos.css">

</head>

  <body>
  <nav>
    <a href="../index.html"
       class="logo">
      RICARDO DUARTE
    </a>

    <div class="nav-links">

    <a
        id="nav-about" href="../index.html">
    </a>
    
    <a
        id="nav-portfolio" href="portfolio.html">
    </a>
    
    <a
        id="nav-contact" href="contactos.html">
    </a>

    </div>
    
    <div class="language-switch">
    
        <span
        class="lang-option"
        data-lang="pt"
        onclick="loadLanguage('pt')">
        PT
    </span>
    
    <span class="lang-separator">/</span>
    
    <span
        class="lang-option"
        data-lang="en"
        onclick="loadLanguage('en')">
        EN
    </span>
    
    </div>
</nav>

<main>
  <section class="contact-hero">

    <div class="container">
        <h1>
            Contactos
        </h1>

        <p class="contact-intro">

            Se pretende entrar em contacto para
            projetos de tradução audiovisual,
            localização, controlo de qualidade
            ou outras colaborações,
            utilize um dos canais abaixo
            ou envie uma mensagem.

        </p>

    </div>

</section>

<section class="contact-section">

    <div class="container contact-grid">

      <div class="contact-info">

          <a href="mailto:teuemail@dominio.com"
             class="contact-icon"
             aria-label="Email">
      
              <svg viewBox="0 0 24 24"
                   fill="none"
                   stroke="currentColor"
                   stroke-width="2">
      
                  <rect x="3"
                        y="5"
                        width="18"
                        height="14">
                  </rect>
      
                  <polyline points="3,7 12,13 21,7">
                  </polyline>
      
              </svg>
      
          </a>
      
          <a href="https://linkedin.com/in/teuperfil"
             target="_blank"
             class="contact-icon"
             aria-label="LinkedIn">
      
              <svg viewBox="0 0 24 24"
                   fill="currentColor">
      
                  <path d="M4.98 3.5C4.98 4.6 4.1 5.5 3 5.5S1 4.6 1 3.5 1.9 1.5 3 1.5s1.98.9 1.98 2zM1.5 8h3V22h-3zM8 8h2.88v1.91h.04c.4-.76 1.38-1.56 2.84-1.56 3.04 0 3.6 2 3.6 4.59V22h-3v-7.1c0-1.69-.03-3.87-2.36-3.87-2.36 0-2.72 1.84-2.72 3.75V22H8z"/>
      
              </svg>
      
          </a>
      
          <a href="https://www.imdb.com/name/XXXXXXX/"
             target="_blank"
             class="contact-icon"
             aria-label="IMDb">
      
              <div class="imdb-icon">
                  IMDb
              </div>
      
          </a>
      
      </div>

        <form class="contact-form">

            <div>

                <label>Nome</label>

                <input type="text">

            </div>

            <div>

                <label>Email</label>

                <input type="email">

            </div>

            <div>

                <label>Assunto</label>

                <input type="text">

            </div>

            <div>

                <label>Mensagem</label>

                <textarea></textarea>

            </div>

            <button
                type="submit"
                class="contact-submit">

                Enviar Mensagem

            </button>

        </form>

    </div>

</section>
</main>

<footer>

  <div class="container footer-content">

    <p>
      © 2026 Ricardo Duarte
    </p>

    <div class="footer-links">

      <a href="#">IMDb</a>

      <a href="#">LinkedIn</a>

      <a href="contactos.html">Email</a>

    </div>

  </div>

</footer>

<script src="../data/index-content.js"></script>
<script src="../scripts/language.js"></script>
<script src="../scripts/script.js"></script>

</body>
</html>
