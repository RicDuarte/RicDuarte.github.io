<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Contactos</title>

  <link rel="stylesheet"
        href="../css/global.css">

  <link rel="stylesheet"
        href="../css/contactos.css">

  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

  <body>
  <nav>
    <a href="../index.html"
       class="logo">
      RICARDO DUARTE
    </a>

    <div class="nav-links">

    <a
        id="nav-about" href="../index.html">
    </a>
    
    <a
        id="nav-portfolio" href="portfolio.html">
    </a>
    
    <a
        id="nav-contact" href="contactos.html">
    </a>

    </div>
    
    <div class="language-switch">
    
        <span
        class="lang-option"
        data-lang="pt"
        onclick="loadLanguage('pt')">
        PT
    </span>
    
    <span class="lang-separator">/</span>
    
    <span
        class="lang-option"
        data-lang="en"
        onclick="loadLanguage('en')">
        EN
    </span>
    
    </div>
</nav>

<main>
  <section class="contact-hero">

    <div class="container">
        <h1>
            Contactos
        </h1>

        <p class="contact-intro">

            Se pretende entrar em contacto para
            projetos de tradução audiovisual,
            localização, controlo de qualidade
            ou outras colaborações,
            utilize um dos canais abaixo
            ou envie uma mensagem.

        </p>

    </div>

</section>

<section class="contact-section">

    <div class="container contact-grid">

      <div class="contact-socials">
      
          <a href="https://www.linkedin.com/in/ricduarte/"
             target="_blank"
             class="social-icon"
             aria-label="LinkedIn">
      
              <i class="fab fa-linkedin-in"></i>
      
          </a>
      
          <a href="https://www.facebook.com/RicardoDuarte.1996"
             target="_blank"
             class="social-icon"
             aria-label="Facebook">
      
              <i class="fab fa-facebook-f"></i>
      
          </a>
      
          <a href="https://www.instagram.com/r.i.c.k.y96/"
             target="_blank"
             class="social-icon"
             aria-label="Instagram">
      
              <i class="fab fa-instagram"></i>
      
          </a>
      
      </div>

        <form class="contact-form">
          <input type="text" id="contact-name" required>
          <input type="email" id="contact-email" required>
          <input type="text" id="contact-subject">
          <textarea id="contact-message" required> </textarea>
          <button type="submit" class="contact-submit" id="contact-submit"> Enviar Mensagem </button>
        </form>

    </div>

</section>
  
  <div id="contact-popup"
     class="contact-popup">
</div>
  
</main>

<footer>

  <div class="container footer-content">

    <p>
      © 2026 Ricardo Duarte
    </p>

    <div class="footer-links">

      <a href="#">IMDb</a>

      <a href="#">LinkedIn</a>

      <a href="contactos.html">Email</a>

    </div>

  </div>

</footer>

      emailjs.init({
          publicKey: "ZEaU7RQWUvTuI-aQY"
      });
</script>
    
<script src="../data/contact-content.js"></script>
<script src="../data/index-content.js"></script>
<script src="../scripts/language.js"></script>
<script src="../scripts/script.js"></script>
<script src="../scripts/contact.js"></script>
    
</body>
</html>
