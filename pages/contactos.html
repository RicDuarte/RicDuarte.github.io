<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Contactos</title>

  <link rel="stylesheet"
        href="../css/global.css">

  <link rel="stylesheet"
        href="../css/contactos.css">

</head>

  <body>
  <nav>
    <a href="../index.html"
       class="logo">
      RICARDO DUARTE
    </a>

    <div class="nav-links">

    <a
        id="nav-about" href="../index.html">
    </a>
    
    <a
        id="nav-portfolio" href="portfolio.html">
    </a>
    
    <a
        id="nav-contact" href="contactos.html">
    </a>

    </div>
    
    <div class="language-switch">
    
        <span
        class="lang-option"
        data-lang="pt"
        onclick="loadLanguage('pt')">
        PT
    </span>
    
    <span class="lang-separator">/</span>
    
    <span
        class="lang-option"
        data-lang="en"
        onclick="loadLanguage('en')">
        EN
    </span>
    
    </div>
</nav>

<main>
  <section class="contact-hero">

    <div class="container">
        <h1>
            Contactos
        </h1>

        <p class="contact-intro">

            Se pretende entrar em contacto para
            projetos de tradução audiovisual,
            localização, controlo de qualidade
            ou outras colaborações,
            utilize um dos canais abaixo
            ou envie uma mensagem.

        </p>

    </div>

</section>

<section class="contact-section">

    <div class="container contact-grid">

      <div class="contact-info">
      
          <a href="mailto:teuemail@dominio.com"
             class="contact-icon">
      
              ✉
      
              <span>Email</span>
      
          </a>
      
          <a href="https://linkedin.com/in/teuperfil"
             target="_blank"
             class="contact-icon">
      
              in
      
              <span>LinkedIn</span>
      
          </a>
      
          <a href="https://www.imdb.com/name/xxxxxx/"
             target="_blank"
             class="contact-icon">
      
              IMDb
      
              <span>IMDb</span>
      
          </a>
      
      </div>

        <form class="contact-form">

            <div>

                <label>Nome</label>

                <input type="text">

            </div>

            <div>

                <label>Email</label>

                <input type="email">

            </div>

            <div>

                <label>Assunto</label>

                <input type="text">

            </div>

            <div>

                <label>Mensagem</label>

                <textarea></textarea>

            </div>

            <button
                type="submit"
                class="contact-submit">

                Enviar Mensagem

            </button>

        </form>

    </div>

</section>
</main>

<footer>

  <div class="container footer-content">

    <p>
      © 2026 Ricardo Duarte
    </p>

    <div class="footer-links">

      <a href="#">IMDb</a>

      <a href="#">LinkedIn</a>

      <a href="contactos.html">Email</a>

    </div>

  </div>

</footer>

<script src="../data/index-content.js"></script>
<script src="../scripts/language.js"></script>
<script src="../scripts/script.js"></script>

</body>
</html>
