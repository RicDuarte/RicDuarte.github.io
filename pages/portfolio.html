<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Portefólio | Ricardo Duarte</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/portefolio.css">

</head>

<body>

<nav>

  <a href="../index.html"
     class="logo">
    RICARDO DUARTE
  </a>

  <div class="nav-links">

    <a id="nav-about"
       href="../index.html">
    </a>

    <a id="nav-portfolio"
       href="portfolio.html">
    </a>

    <a id="nav-contact"
       href="contactos.html">
    </a>

  </div>

  <div class="language-switch">

    <span
      class="lang-option"
      data-lang="pt"
      onclick="loadLanguage('pt')">
      PT
    </span>

    <span class="lang-separator">/</span>

    <span
      class="lang-option"
      data-lang="en"
      onclick="loadLanguage('en')">
      EN
    </span>

  </div>

</nav>

<section class="hero">

  <div class="hero-content">

    <div id="portfolio-subtitle" class="hero-subtitle"></div>

    <h1 id="portfolio-title"></h1>

    <p id="portfolio-description" class="hero-description"></p>

    <div class="platforms">

      <div class="platform">Netflix</div>

      <div class="platform">Prime Video</div>

      <div class="platform">Disney+</div>

      <div class="platform">Max</div>

      <div class="platform">Apple TV+</div>

    </div>

  </div>

</section>

<main>
  
  <section class="filters-toggle">

    <button id="filters-button">

        Filtrar Portefólio ▼

    </button>

</section>

  <section id="filters-panel" class="portfolio-filters">

    <div class="filter-group">

        <h3>Plataforma</h3>

        <div class="filter-chips">

            <button
                class="filter-chip active"
                data-filter-type="platform"
                data-value="all">
            
                Todas
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="Netflix">
            
                Netflix
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="Prime Video">
            
                Prime Video
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="Disney+">
            
                Disney+
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="HBO Max">
            
                HBO Max
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="Canais de TV">
            
                Canais de TV
            
            </button>
            
            <button
                class="filter-chip"
                data-filter-type="platform"
                data-value="Outros">
            
                Outros
            
            </button>

        </div>

    </div>

    <div class="filter-group">

        <h3>Trabalho</h3>

        <div class="filter-chips">

            <button class="filter-chip active" data-filter-type="role" data-value="all">
                Todos
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Tradução">
                Tradução
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Tradução MTPE">
                Tradução MTPE
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Revisão">
                Revisão
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Revisão MTPE">
                Revisão MTPE
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Metadata - Tradução">
                Metadata - Tradução
            </button>

            <button class="filter-chip" data-filter-type="role" data-value="Metadata - Revisão">
                Metadata - Revisão
            </button>

        </div>

    </div>

    <div class="filter-group">

        <h3>Conteúdo</h3>

        <div class="filter-chips">

            <button class="filter-chip active">
                Todos
            </button>

            <button class="filter-chip">
                Filme
            </button>

            <button class="filter-chip">
                Série
            </button>

            <button class="filter-chip">
                Minissérie
            </button>

        </div>

    </div>

</section>
  
<div id="portfolio-container"></div>
  
</main>

<footer>

    <div class="container footer-content">

      <p>
        © 2026 Ricardo Duarte
      </p>

      <div class="footer-links">

        <a href="#">IMDb</a>

        <a href="#">LinkedIn</a>

        <a href="contactos.html">Email</a>

      </div>

    </div>

  </footer>

<script src="../data/portfolio-content.js"></script>
<script src="../data/index-content.js"></script>
<script src="../scripts/language.js"></script>
<script src="../scripts/script.js"></script>
<script src="../data/portfolio-translations.js"></script>
<script src="../scripts/portfolio.js"></script>

</body>
</html>
