<!DOCTYPE html>
<html lang="pt">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Portefólio | Ricardo Duarte</title>

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/portefolio.css">

</head>

<body>

<nav>

  <a href="../index.html"
     class="logo">
    RICARDO DUARTE
  </a>

  <div class="nav-links">

    <a id="nav-about"
       href="../index.html">
    </a>

    <a id="nav-portfolio"
       href="portfolio.html">
    </a>

    <a id="nav-contact"
       href="contactos.html">
    </a>

  </div>

  <div class="language-switch">

    <span
      class="lang-option"
      data-lang="pt"
      onclick="loadLanguage('pt')">
      PT
    </span>

    <span class="lang-separator">/</span>

    <span
      class="lang-option"
      data-lang="en"
      onclick="loadLanguage('en')">
      EN
    </span>

  </div>

</nav>

<section class="hero">

  <div class="hero-content">

    <div id="portfolio-subtitle" class="hero-subtitle"></div>

    <h1 id="portfolio-title"></h1>

    <p id="portfolio-description" class="hero-description"></p>

    <div class="platforms">

      <div class="platform">Netflix</div>

      <div class="platform">Prime Video</div>

      <div class="platform">Disney+</div>

      <div class="platform">Max</div>

      <div class="platform">Apple TV+</div>

    </div>

  </div>

</section>

<main>

<div id="portfolio-container"></div>

  <!-- 2025 -->

  <section class="year-section">

    <h2>2025</h2>

    <div class="carousel-wrapper">

      <button class="arrow arrow-left"
              onclick="scrollCarousel('carousel2025', -1200)">
        ‹
      </button>

      <div class="carousel"
           id="carousel2025">

        <div class="card">

          <div class="card-image">

            <img src="../images/lastkingdom.jpg">

          </div>

          <div class="overlay">

            <div class="top-row">

              <div class="play-btn">▶</div>

              <div class="meta">

                <div class="age">16+</div>

                <div class="type">Filme</div>

              </div>

            </div>

            <div class="genres">

              <div class="genre">Drama</div>

              <div class="genre">Histórico</div>

              <div class="genre">Ação</div>

            </div>

            <div class="badge">

              <span class="badge-icon">🔥</span>

              <span>Título popular</span>

            </div>

          </div>

        </div>

      </div>

      <button class="arrow arrow-right"
              onclick="scrollCarousel('carousel2025', 1200)">
        ›
      </button>

    </div>

  </section>

</main>

<footer>

    <div class="container footer-content">

      <p>
        © 2026 Ricardo Duarte
      </p>

      <div class="footer-links">

        <a href="#">IMDb</a>

        <a href="#">LinkedIn</a>

        <a href="contactos.html">Email</a>

      </div>

    </div>

  </footer>

<script src="../data/portfolio-content.js"></script>
<script src="../data/index-content.js"></script>
<script src="../scripts/language.js"></script>
<script src="../scripts/script.js"></script>
<script src="../scripts/portfolio.js"></script>

</body>
</html>
